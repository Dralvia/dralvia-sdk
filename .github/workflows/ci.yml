# CI for the public Dralvia SDK repository.
#
# This file lives under sdks/.github/workflows/ in the Dralvia monorepo so it is
# inert here (GitHub only reads .github/ at a repository root). When the SDKs are
# exported to the public dralvia-sdk repo, this becomes .github/workflows/ci.yml.
name: SDK CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  javascript:
    name: JavaScript (test, lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Test
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Build (syntax check)
        run: npm run build
      - name: Publish dry run
        run: npm publish --dry-run

  python:
    name: Python (test, lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" twine
      - name: Test
        run: pytest tests
      - name: Lint
        run: ruff check src tests examples
      - name: Build
        run: python -m build
      - name: Publish dry run (metadata check)
        run: python -m twine check dist/*
